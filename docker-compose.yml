version: '3.8'

services:
  # 1. Kapsül: Güvensiz API (Hacker Hedefi)
  api-insecure:
    build: .
    ports:
      - "5001:5001"
    environment:
      - FLASK_APP=services.api_insecure.app:app
    command: flask run --host=0.0.0.0 --port=5001
    volumes:
      - .:/app  # Kodu değiştikçe sunucu otomatik güncellenir.

  # 2. Kapsül: Güvenli API (Savunma Hattı)
  api-secure:
    build: .
    ports:
      - "5002:5002"
    environment:
      - FLASK_APP=services.api_secure.app:app
    command: flask run --host=0.0.0.0 --port=5002
    volumes:
      - .:/app